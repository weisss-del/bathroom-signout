<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Classroom Logs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: linear-gradient(135deg, #0f1923 0%, #1a2942 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 {
    font-size: 36px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .subtitle {
    color: #8aa;
    font-size: 16px;
    margin-bottom: 48px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 800px;
    width: 100%;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 28px; }
  }
  .card {
    background: #162030;
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    text-decoration: none;
    color: #fff;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    background: #1c2942;
  }
  .card .icon { font-size: 64px; margin-bottom: 16px; line-height: 1; }
  .card h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .card p { color: #8aa; font-size: 14px; }
  .bathroom { --accent: #4a9eff; }
  .phone    { --accent: #5bc8ac; }
</style>
</head>
<body>
  <h1>Classroom Logs</h1>
  <p class="subtitle">Choose a station</p>

  <div class="grid">
    <a href="bathroom.html" class="card bathroom">
      <div class="icon">🚻</div>
      <h2>Bathroom Sign-Out</h2>
      <p>Tap your name to sign out and back in</p>
    </a>
    <a href="phone.html" class="card phone">
      <div class="icon">📱</div>
      <h2>Phone Log</h2>
      <p>Earn points for storing your phone</p>
    </a>
  </div>
</body>
</html>
