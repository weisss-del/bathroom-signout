<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Phone Debug</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #fff; padding: 20px; font-size: 14px; line-height: 1.6; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .info { color: #60a5fa; }
  .warn { color: #fbbf24; }
  pre { background: #2a2a2a; padding: 12px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  h2 { margin: 16px 0 8px; color: #fbbf24; }
  button { background: #4a9eff; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; margin: 8px 4px; }
</style>
</head>
<body>
<h1>Phone Log Backend Test</h1>
<p>Click a button to test. Results show below.</p>

<button onclick="testFetch()">1. Test fetch (basic)</button>
<button onclick="testFetchNoCors()">2. Test fetch (no-cors mode)</button>
<button onclick="testFetchManual()">3. Test with manual redirect</button>
<button onclick="clearLog()">Clear</button>

<div id="output"></div>

<script>
  const URL_TO_TEST = 'https://script.google.com/macros/s/AKfycbwlkpQ-QQWTamjCu-e6i0t0rXECi--vfldmeRrrj-0ejQLB0YiAvukUMD9VGlPfWxi38A/exec?action=roster';

  const out = document.getElementById('output');
  function log(msg, type) {
    type = type || 'info';
    const div = document.createElement('div');
    div.className = type;
    div.innerHTML = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    out.appendChild(div);
  }
  function logBlock(label, content) {
    const h = document.createElement('h2');
    h.textContent = label;
    out.appendChild(h);
    const pre = document.createElement('pre');
    pre.textContent = content;
    out.appendChild(pre);
  }
  function clearLog() { out.innerHTML = ''; }

  log('Page origin: ' + window.location.origin, 'info');
  log('Will test URL: ' + URL_TO_TEST.substring(0, 80) + '...', 'info');

  function testFetch() {
    log('--- Test 1: standard fetch ---', 'warn');
    fetch(URL_TO_TEST, { method: 'GET' })
      .then(r => {
        log('Status: ' + r.status + ' ' + r.statusText, r.ok ? 'ok' : 'err');
        log('Type: ' + r.type, 'info');
        log('URL after redirects: ' + r.url, 'info');
        return r.text();
      })
      .then(text => {
        log('Response length: ' + text.length, 'ok');
        logBlock('First 300 chars:', text.substring(0, 300));
      })
      .catch(err => {
        log('FAILED: ' + err.name + ' - ' + err.message, 'err');
      });
  }

  function testFetchNoCors() {
    log('--- Test 2: no-cors mode ---', 'warn');
    fetch(URL_TO_TEST, { method: 'GET', mode: 'no-cors' })
      .then(r => {
        log('Status: ' + r.status, r.ok ? 'ok' : 'warn');
        log('Type: ' + r.type + ' (opaque means cant read)', 'info');
        return r.text();
      })
      .then(text => {
        log('Response length: ' + text.length + ' (likely 0 in no-cors)', 'info');
      })
      .catch(err => {
        log('FAILED: ' + err.name + ' - ' + err.message, 'err');
      });
  }

  function testFetchManual() {
    log('--- Test 3: manual redirect handling ---', 'warn');
    fetch(URL_TO_TEST, { method: 'GET', redirect: 'follow' })
      .then(r => {
        log('Status: ' + r.status, r.ok ? 'ok' : 'err');
        log('Final URL: ' + r.url, 'info');
        log('Headers (visible):', 'info');
        r.headers.forEach((v, k) => log('  ' + k + ': ' + v, 'info'));
        return r.text();
      })
      .then(text => {
        logBlock('Response:', text.substring(0, 500));
      })
      .catch(err => {
        log('FAILED: ' + err.name + ' - ' + err.message, 'err');
      });
  }
</script>
</body>
</html>
