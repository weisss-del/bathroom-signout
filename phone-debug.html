<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Phone Log Debug</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #fff; padding: 20px; font-size: 14px; line-height: 1.6; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .info { color: #60a5fa; }
  .label { color: #888; }
  pre { background: #2a2a2a; padding: 12px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  h2 { margin: 16px 0 8px; color: #fbbf24; }
</style>
</head>
<body>
<h1>Phone Log Debug</h1>
<div id="output"></div>

<script>
  const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwlkpQ-QQWTamjCu-e6i0t0rXECi--vfldmeRrrj-0ejQLB0YiAvukUMD9VGlPfWxi38A/exec';

  const out = document.getElementById('output');
  function log(msg, type) {
    type = type || 'info';
    const div = document.createElement('div');
    div.className = type;
    div.innerHTML = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    out.appendChild(div);
  }
  function logBlock(label, content) {
    const h = document.createElement('h2');
    h.textContent = label;
    out.appendChild(h);
    const pre = document.createElement('pre');
    pre.textContent = content;
    out.appendChild(pre);
  }

  log('Page loaded', 'ok');
  log('BACKEND_URL = ' + BACKEND_URL.substring(0, 60) + '...', 'info');

  if (BACKEND_URL.indexOf('PASTE') === 0) {
    log('SETUP NEEDED: paste your phone URL into BACKEND_URL', 'err');
  } else {
    log('Calling: ' + BACKEND_URL + '?action=roster', 'info');

    fetch(BACKEND_URL + '?action=roster', { method: 'GET', redirect: 'follow' })
      .then(r => {
        log('Got response. Status: ' + r.status + ' ' + r.statusText, r.ok ? 'ok' : 'err');
        log('Content-Type: ' + r.headers.get('content-type'), 'info');
        return r.text();
      })
      .then(text => {
        logBlock('Raw response (first 500 chars):', text.substring(0, 500));
        try {
          const data = JSON.parse(text);
          if (data.roster) {
            log('SUCCESS: parsed roster with ' + data.roster.length + ' students', 'ok');
          } else if (data.error) {
            log('ERROR from backend: ' + data.error, 'err');
          } else {
            log('UNEXPECTED: response is JSON but no roster field', 'err');
            logBlock('Parsed object:', JSON.stringify(data, null, 2));
          }
        } catch (e) {
          log('PARSE FAILED: response is not valid JSON', 'err');
          log('Parse error: ' + e.message, 'err');
        }
      })
      .catch(err => {
        log('FETCH FAILED: ' + err.name + ' - ' + err.message, 'err');
        log('This usually means CORS, network, or wrong URL', 'err');
      });
  }
</script>
</body>
</html>
